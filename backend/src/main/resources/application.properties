#spring.jpa.hibernate.ddl-auto=none
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console
#spring.flyway.enabled=false

# ── POSTGRESQL (PROD) – uncomment and fill ──
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.avxpxxlzumthpeahvpwt
spring.datasource.password=sureshraina@123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# ── JWT ──
parkmate.jwt.secret=${JWT_SECRET:ParkMateOlympiaTechParkDevSecretKey256BitsLong!!}
parkmate.jwt.expiry-ms=86400000

# ── CACHE ──
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=60s

# ── ACTUATOR ──
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}

# ── LOGGING ──
logging.level.com.parkmate=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
